<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        #pid {
            display: flex;
            flex-wrap: wrap; 
            gap: 20px;       
            justify-content: center; 
            padding: 20px;
        }

        .box {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            padding: 10px;
            text-align: center;
            transition: transform 0.2s; 

             display: flex;       /* Alinha imagem e texto lado a lado */
    align-items: flex-start; /* Alinha o conteúdo no topo */
    gap: 15px;           /* Espaço entre a imagem e o texto */
    text-align: left;    /* Alinha o texto para a esquerda */
    width: 350px;
        }

        .box:hover {
            transform: scale(1.05); 
        }

        img {
            width: 150px;
        }

        .livros{
            
            display: flex;
            flex-direction: row;        
    }
        

        .letralivro{
            font-weight: 700;
            font-size: 2rem;
        }

        .info-livro {
    display: flex;
    flex-direction: column;
}

.estrelas {
    color: #ffd700; /* Cor dourada/amarela */
    font-size: 1.2rem;
    margin-top: 10px;
    cursor: pointer;
}

.estrela-vazia {
    color: #ccc; /* Cor cinza para estrelas não marcadas */
}

/* Opcional: efeito de brilho ao passar o mouse */
.estrelas:hover {
    filter: brightness(1.2);
}
.estrelas span {
    cursor: pointer;
    font-size: 1.5rem;
    color: #ccc; /* Cor padrão (apagada) */
    transition: color 0.2s;
}

.estrelas span.ativa {
    color: #ffd700; /* Cor amarela (acesa) */
}

        
    </style>
</head>
<body>
   
    <div class="livros">
        <div id="pid"></div>

    </div>
   
</body>
</html>
<script src="dados.js"></script>
<script>
    for (let i = 0; i < 156; i++) {
    pid.innerHTML += `
    <div class="box">
        <img src="${livros[i].url}" alt="">
        <div class="info-livro">
            <span class="letralivro">${livros[i].nome}</span>
            <span>AUTOR: ${livros[i].autor}</span>
            
            <div class="estrelas">
                <span onclick="avaliar(this, 1)">★</span>
                <span onclick="avaliar(this, 2)">★</span>
                <span onclick="avaliar(this, 3)">★</span>
                <span onclick="avaliar(this, 4)">★</span>
                <span onclick="avaliar(this, 5)">★</span>
            </div>
        </div>
    </div>`;
}

function avaliar(estrelaClicada, nota) {
    // Busca apenas o container de estrelas de ONDE VOCÊ CLICOU (o pai da estrela)
    const container = estrelaClicada.parentElement;
    const estrelas = container.querySelectorAll('span');

    estrelas.forEach((estrela, index) => {
        // Se a posição da estrela for menor que a nota clicada, ela acende
        if (index < nota) {
            estrela.classList.add('ativa');
        } else {
            estrela.classList.remove('ativa');
        }
    });
}

    
</script>
