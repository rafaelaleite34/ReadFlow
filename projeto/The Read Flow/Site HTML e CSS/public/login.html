<script>


    function entrar() {
    let email = email_input.value;
    let senha = senha_input.value;
    let erro = false;

    if (email == "" || senha == "") {
        div_mensagem1.innerHTML = "Preencha seu email.";
        div_mensagem2.innerHTML = "Preencha sua senha.";
        erro = true;
    }

    else if (email.indexOf("@") == -1 || email.indexOf(".") == -1) {
        div_mensagem1.innerHTML = "Email inválido.";
        erro = true;
    }

    else if (senha.length < 8) {
        div_mensagem2.innerHTML = "A senha deve ter no mínimo 8 caracteres.";
        erro = true;
    }

    if (!erro) {
       

    

    fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: email,
                senhaServer: senha
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    // sessionStorage.ID_USUARIO = json.id;
                    // sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = href="paginaInicial.html";
                        alert("Login realizado com sucesso!");
                    }, 1000); // apenas para exibir o loading

                });

            } else {
                 alert("Houve um erro ao tentar realizar o login!");
                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }
}
